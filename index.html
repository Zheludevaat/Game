<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0" />
    <meta name="theme-color" content="#05020d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Seven Lamps" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="Abyss of the Seven Lamps — a Hermetic infinite dungeon crawler" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon-180.png" />
    <link rel="icon" href="./icon-192.png" />
    <title>Abyss of the Seven Lamps</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // One-shot self-heal for users stranded by an older, broken
      // service-worker cache. If the app shell never mounts (no children in
      // #root) after 4 seconds, nuke every cache, unregister every SW, and
      // reload once. The ?reset=1 marker prevents an infinite reload loop.
      (function () {
        if (location.search.indexOf('reset=1') !== -1) return;
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount > 0) return;
          try {
            var done = function () {
              var url = location.pathname + (location.search ? location.search + '&' : '?') + 'reset=1';
              location.replace(url);
            };
            var jobs = [];
            if (window.caches && caches.keys) {
              jobs.push(caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }));
            }
            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
              jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister(); }));
              }));
            }
            Promise.all(jobs).then(done, done);
          } catch (e) { location.reload(); }
        }, 4000);
      })();
    </script>
  </body>
</html>
